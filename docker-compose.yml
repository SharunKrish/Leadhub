version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      # Provide a fallback secret key in case it is not set in the .env file
      - SECRET_KEY=django-insecure-production-fallback-key-should-be-changed
      - SQLITE_DB_DIR=/app/db
    volumes:
      - sqlite_data:/app/db
    restart: unless-stopped

volumes:
  sqlite_data:
